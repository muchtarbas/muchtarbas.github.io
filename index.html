<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repositories Site</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h1 {
      margin-bottom: 25px;
    }

    .btn {
      display: inline-block;
      padding: 12px 24px;
      margin: 10px;
      border-radius: 8px;
      text-decoration: none;
      color: white;
      font-size: 16px;
      transition: 0.3s;
    }

    .btn1 {
      background: #3498db;
    }

    .btn2 {
      background: #2ecc71;
    }

    .btn3 {
      background: #e74c3c;
    }

    .btn:hover {
      opacity: 0.8;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Menu Page</h1>

    <a href="page1.html" class="btn btn1">
      Page 1
    </a>

    <a href="page2.html" class="btn btn2">
      Page 2
    </a>

    <a href="page3.html" class="btn btn3">
      Page 3
    </a>
  </div>

</body>
</html>
